name: Deploy Bots Builder

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for AWS role assumption
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website (Next.js static export)
        working-directory: web
        run: npm run build
        env:
          NEXT_PUBLIC_COGNITO_AUTHORITY: ${{ vars.NEXT_PUBLIC_COGNITO_AUTHORITY }}
          NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ vars.NEXT_PUBLIC_COGNITO_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_DOMAIN: ${{ vars.NEXT_PUBLIC_COGNITO_DOMAIN }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.SITE_URL }}

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: CDK deploy (infra + site assets + CloudFront invalidation)
        working-directory: infra
        run: npx cdk deploy --all --require-approval never
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          AUTH_DOMAIN_PREFIX: ${{ vars.AUTH_DOMAIN_PREFIX }}
          GITHUB_REPO: ${{ github.repository }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL }}
          OWNER_EMAIL: ${{ vars.OWNER_EMAIL }}
          DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
          HOSTED_ZONE_NAME: ${{ vars.HOSTED_ZONE_NAME }}
